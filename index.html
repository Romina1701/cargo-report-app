<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>入庫報告書</title>
<style>
body{margin:0;background:#eef1f5;font-family:-apple-system,BlinkMacSystemFont,'Yu Gothic',Meiryo,sans-serif;color:#111}.app{max-width:980px;margin:auto;padding:12px}.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 2px 8px #0002}h1{font-size:21px;margin:4px 0 10px}h2{font-size:17px;border-left:5px solid #111;padding-left:8px;margin:18px 0 8px}label{font-weight:700;display:block;margin-top:10px}input,select{width:100%;font-size:16px;padding:10px;border:1px solid #b9c0c9;border-radius:8px;box-sizing:border-box}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}button{width:100%;font-size:17px;font-weight:700;padding:13px;border:0;border-radius:10px;color:#fff;background:#1456b8;margin-top:12px}.dark{background:#111}.green{background:#16803c}.note{font-size:13px;color:#555}.agent-buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.agent-btn{background:#f8fafc;color:#111;border:2px solid #b9c0c9;text-align:left}.agent-btn.active{background:#dbeafe;border-color:#1456b8;color:#0f3d8a}.agent-code{font-size:20px;font-weight:900;margin-right:6px;color:#1456b8}.agent-name{font-size:12px;display:block;margin-top:3px}.photo-status{font-size:13px;color:#166534}
.sheetwrap{background:#fff;padding:12px;overflow:auto}.sheet{width:794px;min-height:1123px;margin:auto;background:#fff;border:2px solid #111;padding:10px 14px;position:relative}.head{display:grid;grid-template-columns:58px 1fr 310px;border:2px solid #111;border-bottom:0;height:45px}.qr{border-right:1px solid #111;display:flex;align-items:center;justify-content:center}.qrbox{width:34px;height:34px;background:repeating-linear-gradient(90deg,#111 0 4px,#fff 4px 7px)}.title{display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900}.hr{border-left:1px solid #111}.hl{display:grid;grid-template-columns:92px 1fr;height:21px;border-bottom:1px solid #111;font-size:12px}.hl:last-child{border-bottom:0}.hlabel{background:#eee;border-right:1px solid #111;display:flex;align-items:center;justify-content:center;font-weight:900}.hval{text-align:center}.logo{border:2px solid #111;border-bottom:0;height:24px;font-size:18px;font-weight:900;font-style:italic;padding-left:7px;display:flex;align-items:center}.grid{border:2px solid #111;border-bottom:0}.trow{display:grid;grid-template-columns:1fr 1fr;min-height:38px;border-bottom:1px solid #111}.cell{position:relative;display:flex;align-items:end;justify-content:center;padding:16px 6px 4px;font-size:18px}.cell:first-child{border-right:1px solid #111}.cap{position:absolute;top:2px;left:0;right:0;text-align:center;font-size:11px;font-weight:900;color:#444}.mawb{display:grid;grid-template-columns:1fr 1fr;border:2px solid #111;border-bottom:0;height:33px}.mawb div{display:flex;align-items:end;padding:0 8px 3px;font-size:18px}.mawb div:first-child{border-right:1px solid #111}.lbl{font-family:serif;font-weight:700}table{width:100%;border-collapse:collapse}.detail{border:2px solid #111;font-size:13px}.detail th,.detail td{border:1px solid #111;text-align:center;height:24px;padding:1px}.detail th{background:#e7e7e7}.remarks{text-align:left!important;padding-left:5px!important}.total{display:grid;grid-template-columns:160px 1fr 160px 1fr;border:2px solid #111;border-top:0;height:43px;font-size:25px}.total div{display:flex;align-items:center;justify-content:center;border-right:1px solid #111}.total div:nth-child(1),.total div:nth-child(3){background:#eee;font-weight:900}.pics{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;height:372px;border-left:2px solid #111;border-right:2px solid #111;border-bottom:2px solid #111}.slot{border-right:1px solid #111;border-bottom:1px solid #111;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}.slot:nth-child(3),.slot:nth-child(6){border-right:0}.slot:nth-child(n+4){border-bottom:0}.slot img{width:100%;height:100%;object-fit:cover}.pname{position:absolute;top:8px;left:10px;font-size:28px}.blank{height:126px;border-left:2px solid #111;border-right:2px solid #111}.foot{position:absolute;left:16px;right:16px;bottom:8px;height:55px}.bars{font-family:monospace;font-size:29px;letter-spacing:1px;height:30px;overflow:hidden}.btext{font-family:monospace;font-size:15px;letter-spacing:6px}.company{position:absolute;right:0;bottom:0;font-size:13px}
@media(max-width:820px){.row,.row4,.agent-buttons{grid-template-columns:1fr}.sheet{transform:scale(.46);transform-origin:top left;margin:0}.sheetwrap{height:540px}}@media print{.card{display:none}body{background:#fff}.app{padding:0;max-width:none}.sheetwrap{padding:0;overflow:visible}.sheet{margin:0 auto}}
</style></head><body><div class="app"><div class="card"><h1>📦 入庫報告書フォーム</h1><p class="note">代理店はスマホ用に大きいボタンで選択できます。</p><h2>基本情報</h2><div class="row"><div><label>入庫担当者</label><input id="staff" oninput="updateReport()"></div><div><label>作成日時</label><input id="createdAt" oninput="updateReport()"></div></div><label>代理店名</label><div id="priorityAgents" class="agent-buttons"></div><label>その他代理店</label><select id="otherAgent" onchange="selectOtherAgent()"></select><div class="row"><div><label>代理店コード</label><input id="agentCode" readonly></div><div><label>X線検査日時</label><input id="xrayAt" oninput="updateReport()"></div></div><div class="row"><div><label>Shipper / お客様名</label><input id="shipper" oninput="updateReport()"></div><div><label>入庫No 自動</label><input id="inboundNo" readonly></div></div><div class="row"><div><label>MAWB No.</label><input id="mawb" oninput="updateReport()"></div><div><label>HAWB No.</label><input id="hawb" oninput="updateReport()"></div></div><h2>貨物明細</h2><div id="items"></div><button class="dark" onclick="addItem()">明細行を追加</button><h2>写真 6枚</h2><div class="row"><div><label>写真①</label><input type="file" accept="image/*" onchange="compressPhoto(this,1)"><div id="photoStatus1" class="photo-status"></div></div><div><label>写真②</label><input type="file" accept="image/*" onchange="compressPhoto(this,2)"><div id="photoStatus2" class="photo-status"></div></div></div><div class="row"><div><label>写真③</label><input type="file" accept="image/*" onchange="compressPhoto(this,3)"><div id="photoStatus3" class="photo-status"></div></div><div><label>写真④</label><input type="file" accept="image/*" onchange="compressPhoto(this,4)"><div id="photoStatus4" class="photo-status"></div></div></div><div class="row"><div><label>写真⑤</label><input type="file" accept="image/*" onchange="compressPhoto(this,5)"><div id="photoStatus5" class="photo-status"></div></div><div><label>写真⑥</label><input type="file" accept="image/*" onchange="compressPhoto(this,6)"><div id="photoStatus6" class="photo-status"></div></div></div><button class="green" onclick="updateReport()">帳票を更新</button><button onclick="window.print()">印刷 / PDF保存</button></div>
<div class="sheetwrap"><div class="sheet"><div class="head"><div class="qr"><div class="qrbox"></div></div><div class="title">入庫報告書</div><div class="hr"><div class="hl"><div class="hlabel">作成日時</div><div class="hval" id="outCreatedAt"></div></div><div class="hl"><div class="hlabel">入庫担当者</div><div class="hval" id="outStaff"></div></div></div></div><div class="logo">JAL CARGO</div><div class="grid"><div class="trow"><div class="cell"><div class="cap">代理店名</div><span id="outAgent"></span></div><div class="cell"><div class="cap">X線検査日時</div><span id="outXrayAt"></span></div></div><div class="trow"><div class="cell"><div class="cap">Shipper</div><span id="outShipper"></span></div><div class="cell"><div class="cap">入庫No</div><span id="outInboundNo"></span></div></div></div><div class="mawb"><div><span class="lbl">MAWB No.　</span><span id="outMawb"></span></div><div><span class="lbl">HAWB No.　</span><span id="outHawb"></span></div></div><table class="detail"><thead><tr><th>No</th><th>W</th><th>L</th><th>H</th><th>個数</th><th>重量</th><th>備考</th><th>貨物形状</th></tr></thead><tbody id="outRows"></tbody></table><div class="total"><div>合計個数</div><div id="outTotalPieces">0個</div><div>合計重量</div><div id="outTotalWeight">0.0Kg</div></div><div class="pics"><div class="slot" id="photoSlot1"><span class="pname">写真 ①</span></div><div class="slot" id="photoSlot2"><span class="pname">写真 ②</span></div><div class="slot" id="photoSlot3"><span class="pname">写真 ③</span></div><div class="slot" id="photoSlot4"><span class="pname">写真 ④</span></div><div class="slot" id="photoSlot5"><span class="pname">写真 ⑤</span></div><div class="slot" id="photoSlot6"><span class="pname">写真 ⑥</span></div></div><div class="blank"></div><div class="foot"><div class="bars">||||| || ||| |||| || ||||| ||| || |||||| |||</div><div class="btext" id="outBarcode"></div><div class="company">日航関西エアカーゴ・システム株式会社</div></div></div></div></div>
<script>
var itemCount=0,selectedAgentIndex=0,priorityCodes=['IEC','OCS','VHF','MLG','YTJ','EIJ'];
var agents=[['IEC','インターナショナルエクスプレス株式会社'],['OCS','株式会社OCS'],['VHF','ロジスティードエクスプレス株式会社'],['MLG','商船三井ロジスティクス株式会社'],['YTJ','YTJ'],['EIJ','エクスペダイターズ・ジャパン株式会社'],['KAD','ケイラインロジスティックス株式会社'],['NNR','西日本鉄道株式会社'],['SSA','株式会社阪急阪神エクスプレス'],['YLK','安田ロジスティクス株式会社'],['SGJ','SGHグローバル・ジャパン株式会社'],['DSV','ディエスヴィ・エアーシー株式会社'],['KNJ','キューネアンド・ナーゲル株式会社'],['FKT','福山通運株式会社'],['KSC','コクサイエアロマリン株式会社'],['ATA','株式会社アルプス物流'],['JPT','ジュピター・ジャパン株式会社'],['UNI','三菱倉庫株式会社'],['UCI','ユーシーアイエアフレイトジャパン株式会社'],['KNC','鴻池運輸株式会社'],['YGF','ヤマト運輸株式会社'],['KWE','株式会社近鉄エクスプレス'],['KAF','ケイビン航空株式会社'],['MWT','名鉄ワールドトランスポート株式会社'],['TAD','泰運商会'],['APEX','株式会社エイペックスインターナショナル'],['JLI','株式会社ロジ・レックス'],['TSC','辰日商会'],['SNO','佐野運輸株式会社'],['JIF','ジャスフォワーディングジャパン株式会社'],['KSK','京神倉庫株式会社']];
var shapes=['カートン','パレット','木箱','木枠','ロール','ビニール','トライウォール','紙袋','ドラム','ファイバードラム','ジェリ缶'];
function g(id){return document.getElementById(id)}function v(id){var e=g(id);return e?e.value:''}function pad(n){return('0'+n).slice(-2)}function dateText(d){var w=['日','月','火','水','木','金','土'][d.getDay()];return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 '+w+'曜日 '+pad(d.getHours())+'時'+pad(d.getMinutes())+'分'}function timePart(d){return String(d.getFullYear())+pad(d.getMonth()+1)+pad(d.getDate())+pad(d.getHours())+pad(d.getMinutes())}function a(){return agents[selectedAgentIndex]}function find(code){for(var i=0;i<agents.length;i++){if(agents[i][0]==code)return i}return 0}
function setupAgents(){var pri=g('priorityAgents');priorityCodes.forEach(function(c){var idx=find(c),x=agents[idx],b=document.createElement('button');b.type='button';b.className='agent-btn';b.id='agentBtn'+idx;b.onclick=function(){selectAgent(idx)};b.innerHTML='<span class="agent-code">'+x[0]+'</span><span class="agent-name">'+x[1]+'</span>';pri.appendChild(b)});var sel=g('otherAgent');sel.innerHTML='<option value="">その他代理店を選択</option>';agents.forEach(function(x,i){if(priorityCodes.indexOf(x[0])<0){var o=document.createElement('option');o.value=i;o.text=x[0]+'　'+x[1];sel.appendChild(o)}});selectAgent(find('IEC'))}
function selectOtherAgent(){if(v('otherAgent')!=='')selectAgent(Number(v('otherAgent')))}function selectAgent(idx){selectedAgentIndex=idx;g('agentCode').value=a()[0];g('inboundNo').value=a()[0]+timePart(new Date());Array.from(document.getElementsByClassName('agent-btn')).forEach(function(b){b.className='agent-btn'});var b=g('agentBtn'+idx);if(b)b.className='agent-btn active';updateReport()}
function addItem(w,l,h,p,kg,r,sh){itemCount++;var s='<select id="shape'+itemCount+'" onchange="updateReport()">';shapes.forEach(function(x){s+='<option'+(x==(sh||'')?' selected':'')+'>'+x+'</option>'});s+='</select>';var box=document.createElement('div');box.className='card';box.style.boxShadow='none';box.style.border='1px solid #ddd';box.innerHTML='<b>明細 '+itemCount+'</b><div class="row4"><div><label>W</label><input id="w'+itemCount+'" value="'+(w||'')+'" oninput="updateReport()"></div><div><label>L</label><input id="l'+itemCount+'" value="'+(l||'')+'" oninput="updateReport()"></div><div><label>H</label><input id="h'+itemCount+'" value="'+(h||'')+'" oninput="updateReport()"></div><div><label>個数</label><input id="p'+itemCount+'" type="number" value="'+(p||'')+'" oninput="updateReport()"></div></div><div class="row"><div><label>重量kg</label><input id="kg'+itemCount+'" type="number" step="0.1" value="'+(kg||'')+'" oninput="updateReport()"></div><div><label>貨物形状</label>'+s+'</div></div><label>備考</label><input id="r'+itemCount+'" value="'+(r||'')+'" oninput="updateReport()">';g('items').appendChild(box);updateReport()}
function updateReport(){g('outCreatedAt').innerText=v('createdAt');g('outStaff').innerText=v('staff');g('outAgent').innerText=a()[1];g('outXrayAt').innerText=v('xrayAt');g('outShipper').innerText=v('shipper');g('outInboundNo').innerText=v('inboundNo');g('outMawb').innerText=v('mawb');g('outHawb').innerText=v('hawb');g('outBarcode').innerText='* '+v('inboundNo')+' *';var rows='',tp=0,tw=0;for(var i=1;i<=14;i++){if(i<=itemCount){var p=Number(v('p'+i)||0),kg=Number(v('kg'+i)||0);tp+=p;tw+=kg;rows+='<tr><td>'+i+'</td><td>'+v('w'+i)+'</td><td>'+v('l'+i)+'</td><td>'+v('h'+i)+'</td><td>'+(v('p'+i)?v('p'+i)+'個':'')+'</td><td>'+(v('kg'+i)?v('kg'+i)+'Kg':'')+'</td><td class="remarks">'+v('r'+i)+'</td><td>'+v('shape'+i)+'</td></tr>'}else rows+='<tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>'}g('outRows').innerHTML=rows;g('outTotalPieces').innerText=tp+'個';g('outTotalWeight').innerText=(Math.round(tw*10)/10).toFixed(1)+'Kg'}
function compressPhoto(input,no){if(!input.files||!input.files[0])return;var reader=new FileReader();reader.onload=function(e){var img=new Image();img.onload=function(){var max=1200,w=img.width,h=img.height;if(w>h&&w>max){h=Math.round(h*max/w);w=max}if(h>=w&&h>max){w=Math.round(w*max/h);h=max}var c=document.createElement('canvas');c.width=w;c.height=h;var ctx=c.getContext('2d');ctx.drawImage(img,0,0,w,h);var q=.82,data=c.toDataURL('image/jpeg',q),kb=Math.round(data.length*.75/1024);while(kb>200&&q>.35){q-=.07;data=c.toDataURL('image/jpeg',q);kb=Math.round(data.length*.75/1024)}while(kb>200&&w>500&&h>500){w=Math.round(w*.85);h=Math.round(h*.85);c.width=w;c.height=h;ctx=c.getContext('2d');ctx.drawImage(img,0,0,w,h);data=c.toDataURL('image/jpeg',.42);kb=Math.round(data.length*.75/1024)}g('photoSlot'+no).innerHTML='<img src="'+data+'">';g('photoStatus'+no).innerText='圧縮後：約'+kb+'KB'};img.src=e.target.result};reader.readAsDataURL(input.files[0])}
window.onload=function(){var d=new Date();g('createdAt').value=dateText(d);g('xrayAt').value=dateText(d);setupAgents();addItem('','','','','','','カートン');updateReport()}
</script></body></html>
